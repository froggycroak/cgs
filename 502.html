<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务不可用 | Digital Urban Renew</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body data-page="unavailable">
    <header class="header">
        <div class="container header-inner">
            <div class="header-brand">
                <h1 class="logo">Digital Urban Renew</h1>
                <p class="tagline">服务不可用</p>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="unavailable-panel" aria-labelledby="unavailable-title">
                <p class="unavailable-code" id="error-code">HTTP 502</p>
                <h2 class="unavailable-title" id="unavailable-title">该页面内容尚未开放</h2>
                <p class="unavailable-message">尽情期待……</p>
                <p class="unavailable-hint">网关或服务暂时不可用，请稍后再试。</p>
                <div class="unavailable-actions">
                    <button type="button" class="btn btn-black" onclick="closePage()">关闭此页</button>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 ArchiFrog | <a href="dev/index.html">Developer</a></p>
        </div>
    </footer>

    <script src="close-page.js"></script>
